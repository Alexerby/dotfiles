[colors]
draw_bold_text_with_bright_colors = true

[colors.primary]
background = "0x1e1e2e"

[colors.normal]
black   = "#11111b"  # crust
red     = "#f38ba8"  # red
green   = "#a6e3a1"  # green
yellow  = "#f9e2af"  # yellow
blue    = "#89b4fa"  # blue
magenta = "#cba6f7"  # mauve
cyan    = "#94e2d5"  # teal
white   = "#bac2de"  # subtext1

# Bright colors
[colors.bright]
black   = "#585b70"  # surface2
red     = "#eba0ac"  # maroon
green   = "#a6e3a1"  # green (same as normal green)
yellow  = "#fab387"  # peach
blue    = "#74c7ec"  # sapphire
magenta = "#f5c2e7"  # pink
cyan    = "#89dceb"  # sky
white   = "#f5e0dc"  # rosewater

# Cursor colors
[colors.cursor]
text = "#1e1e2e"    # base
cursor = "#cdd6f4"  # text

[font]
size = 16

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "BoldItalic"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "MediumItalic"

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Medium"

[window]
opacity = 0.8

[window.padding]
x = 5
y = 5

[[keyboard.bindings]]
key = "J"
mods = "Super"
chars = "\u000a"

[[keyboard.bindings]]
key = "K"
mods = "Super"
chars = "\u000b"
